# ContainerPath Test Webhook
#
# This deploys a minimal mutating webhook that injects a ConfigMap as a
# volumeMount into virt-launcher pods. This simulates what cloud credential
# injection webhooks (AWS IRSA, GCP Workload Identity, Vault Agent) do.
#
# Usage:
#   1. Apply this file:
#      kubectl apply -f containerpath-webhook-test.yaml
#
#   2. Wait for the webhook pod to be ready:
#      kubectl wait --for=condition=Ready pod/inject-webhook -n default --timeout=60s
#
#   3. Get the CA bundle and patch the webhook config:
#      CA=$(kubectl logs inject-webhook | grep CA_BUNDLE= | sed 's/CA_BUNDLE=//')
#      kubectl patch mutatingwebhookconfiguration test-inject-creds \
#        --type=json -p "[{\"op\":\"replace\",\"path\":\"/webhooks/0/clientConfig/caBundle\",\"value\":\"${CA}\"}]"
#
#   4. Create a VM with a containerPath volume pointing to /var/run/test-creds:
#      See containerpath-vm-test.yaml
#
#   5. Inside the VM (Fedora), mount the virtiofs:
#      sudo mkdir -p /mnt/creds
#      sudo mount -t virtiofs creds /mnt/creds
#      cat /mnt/creds/token
#
#   6. Cleanup:
#      kubectl delete -f containerpath-webhook-test.yaml
#      kubectl delete -f containerpath-vm-test.yaml
#
# Requirements:
#   - KubeVirt 1.8+ with ContainerPathVolumes feature gate enabled
#   - The webhook generates a self-signed TLS cert with SAN (required by K8s 1.34+)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-creds
  namespace: default
data:
  token: my-fake-credential
  endpoint: https://api.example.com
---
apiVersion: v1
kind: Pod
metadata:
  name: inject-webhook
  namespace: default
  labels:
    app: inject-webhook
spec:
  containers:
  - name: webhook
    image: python:3.12-slim
    command:
    - python3
    - -c
    - |
      import json,ssl,base64,http.server,subprocess
      subprocess.run(["openssl","req","-x509","-newkey","rsa:2048","-keyout","/tmp/k.pem",
        "-out","/tmp/c.pem","-days","1","-nodes","-subj","/CN=inject-webhook.default.svc",
        "-addext","subjectAltName=DNS:inject-webhook.default.svc,DNS:inject-webhook.default.svc.cluster.local"],
        check=True,capture_output=True)
      print(f"CA_BUNDLE={base64.b64encode(open('/tmp/c.pem','rb').read()).decode()}",flush=True)

      class H(http.server.BaseHTTPRequestHandler):
        def do_POST(self):
          b=json.loads(self.rfile.read(int(self.headers["Content-Length"])))
          r=b["request"];p=r["object"];pa=[]
          if p.get("metadata",{}).get("labels",{}).get("kubevirt.io")=="virt-launcher":
            if not any(v.get("name")=="test-creds" for v in p.get("spec",{}).get("volumes",[])):
              pa.append({"op":"add","path":"/spec/volumes/-","value":{"name":"test-creds","configMap":{"name":"test-creds"}}})
              for i,c in enumerate(p.get("spec",{}).get("containers",[])):
                if c["name"]=="compute":
                  pa.append({"op":"add","path":f"/spec/containers/{i}/volumeMounts/-","value":{"name":"test-creds","mountPath":"/var/run/test-creds","readOnly":True}});break
              print(f"INJECTED into {p['metadata'].get('generateName','?')}",flush=True)
          self.send_response(200);self.send_header("Content-Type","application/json");self.end_headers()
          self.wfile.write(json.dumps({"apiVersion":"admission.k8s.io/v1","kind":"AdmissionReview","response":{"uid":r["uid"],"allowed":True,"patchType":"JSONPatch","patch":base64.b64encode(json.dumps(pa).encode()).decode()}}).encode())
        def log_message(self,*a):pass

      ctx=ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER);ctx.load_cert_chain("/tmp/c.pem","/tmp/k.pem")
      s=http.server.HTTPServer(("0.0.0.0",8443),H);s.socket=ctx.wrap_socket(s.socket,server_side=True)
      print("Webhook serving on :8443",flush=True);s.serve_forever()
    ports:
    - containerPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: inject-webhook
  namespace: default
spec:
  selector:
    app: inject-webhook
  ports:
  - port: 443
    targetPort: 8443
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: test-inject-creds
webhooks:
- name: inject-creds.test.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  reinvocationPolicy: IfNeeded
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
  clientConfig:
    service:
      name: inject-webhook
      namespace: default
      path: /mutate
      port: 443
    caBundle: ""  # Patch with CA_BUNDLE from webhook logs (see usage above)
