install: |
  ## Desktop Installation

  Download the latest release tarball and extract to your Headlamp plugins directory:

  ```bash
  mkdir -p ~/.config/Headlamp/plugins/headlamp-kubevirt
  tar -xzf headlamp-kubevirt-*.tar.gz -C ~/.config/Headlamp/plugins/headlamp-kubevirt
  ```

  ## In-Cluster Installation

  Add as an init container to your Headlamp deployment:

  ```yaml
  initContainers:
    - name: headlamp-kubevirt
      image: ghcr.io/naval-group/headlamp-kubevirt:latest
      command: ["/bin/sh", "-c"]
      args: ["cp -r /plugins/headlamp-kubevirt /headlamp-plugins/"]
      volumeMounts:
        - name: headlamp-plugins
          mountPath: /headlamp-plugins
  ```
