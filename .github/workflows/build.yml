name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx @kinvolk/headlamp-plugin format --check .

      - name: Lint
        run: npx @kinvolk/headlamp-plugin lint .

      - name: Type check
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Test
        run: npx @kinvolk/headlamp-plugin test .

      - name: Build
        run: npx @kinvolk/headlamp-plugin build .

      - name: Package
        run: |
          mkdir -p kubevirt/dist
          cp dist/main.js kubevirt/dist/
          cp package.json kubevirt/
          npx @kinvolk/headlamp-plugin package kubevirt
          for f in kubevirt-*.tar.gz; do mv "$f" "headlamp-${f}"; done

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: headlamp-kubevirt
          path: |
            dist/
            headlamp-kubevirt-*.tar.gz

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: headlamp-kubevirt

      - name: Compute checksum
        run: |
          sha256sum headlamp-kubevirt-*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            headlamp-kubevirt-*.tar.gz
            checksums.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
