name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx @kinvolk/headlamp-plugin format --check .

      - name: Lint
        run: npx @kinvolk/headlamp-plugin lint .

      - name: Type check
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Test
        run: npx @kinvolk/headlamp-plugin test .

      - name: Build
        run: npx @kinvolk/headlamp-plugin build .

      - name: Package
        run: npx @kinvolk/headlamp-plugin package .

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: headlamp-kubevirt
          path: |
            dist/
            headlamp-kubevirt-*.tar.gz

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: headlamp-kubevirt

      - name: Compute checksum
        run: |
          sha256sum headlamp-kubevirt-*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@c062e08bd532815e2082a07e6cbe248321225571 # v2.1.0
        with:
          files: |
            headlamp-kubevirt-*.tar.gz
            checksums.txt
          generate_release_notes: true
