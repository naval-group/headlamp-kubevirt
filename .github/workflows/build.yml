name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx @kinvolk/headlamp-plugin format --check .

      - name: Lint
        run: npx @kinvolk/headlamp-plugin lint .

      - name: Type check
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Test
        run: npx @kinvolk/headlamp-plugin test .

      - name: Build
        run: npx @kinvolk/headlamp-plugin build .

      - name: Package
        run: |
          mkdir -p kubevirt/dist
          cp dist/main.js kubevirt/dist/
          cp package.json kubevirt/
          npx @kinvolk/headlamp-plugin package kubevirt
          for f in kubevirt-*.tar.gz; do mv "$f" "headlamp-${f}"; done

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-headlamp-kubevirt.spdx.json
          output-file: sbom-headlamp-kubevirt.spdx.json

      - name: Compute artifact digest
        id: digest
        run: |
          sha256sum headlamp-kubevirt-*.tar.gz > checksums.txt
          digest=$(sha256sum headlamp-kubevirt-*.tar.gz | base64 -w0)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: headlamp-kubevirt
          path: |
            dist/
            headlamp-kubevirt-*.tar.gz
            checksums.txt
            sbom-headlamp-kubevirt.spdx.json

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  provenance:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.digest }}"
      upload-assets: true

  release:
    needs: [build, provenance]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: headlamp-kubevirt

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            headlamp-kubevirt-*.tar.gz
            checksums.txt
            sbom-headlamp-kubevirt.spdx.json
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
