name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx @kinvolk/headlamp-plugin format --check .

      - name: Lint
        run: npx @kinvolk/headlamp-plugin lint .

      - name: Type check
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Test
        run: npx @kinvolk/headlamp-plugin test .

      - name: Build
        run: npx @kinvolk/headlamp-plugin build .

      - name: Package
        run: |
          mkdir -p kubevirt/dist
          cp dist/main.js kubevirt/dist/
          cp package.json kubevirt/
          npx @kinvolk/headlamp-plugin package kubevirt
          for f in kubevirt-*.tar.gz; do mv "$f" "headlamp-${f}"; done

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-headlamp-kubevirt.spdx.json
          output-file: sbom-headlamp-kubevirt.spdx.json

      - name: Compute checksums
        run: sha256sum headlamp-kubevirt-*.tar.gz > checksums.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: headlamp-kubevirt
          path: |
            dist/
            headlamp-kubevirt-*.tar.gz
            checksums.txt
            sbom-headlamp-kubevirt.spdx.json

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: headlamp-kubevirt

      # Generate SLSA provenance attestation signed via Sigstore OIDC.
      # Stored in GitHub's attestation store and exported as .intoto.jsonl release asset.
      # Verify with: gh attestation verify headlamp-kubevirt-*.tar.gz --repo naval-group/headlamp-kubevirt
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: headlamp-kubevirt-*.tar.gz

      # Export the attestation bundle as .intoto.jsonl (required by OpenSSF Scorecard)
      - name: Export provenance bundle
        run: |
          TARBALL=$(ls headlamp-kubevirt-*.tar.gz)
          cp "${{ steps.attest.outputs.bundle-path }}" "${TARBALL}.intoto.jsonl"

      # Sign the tarball with cosign (keyless/Sigstore OIDC)
      # Produces .sig file (required by OpenSSF Scorecard for signed releases)
      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign release artifacts
        run: |
          TARBALL=$(ls headlamp-kubevirt-*.tar.gz)
          cosign sign-blob --yes --output-signature "${TARBALL}.sig" "${TARBALL}"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            headlamp-kubevirt-*.tar.gz
            headlamp-kubevirt-*.tar.gz.intoto.jsonl
            headlamp-kubevirt-*.tar.gz.sig
            checksums.txt
            sbom-headlamp-kubevirt.spdx.json
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
