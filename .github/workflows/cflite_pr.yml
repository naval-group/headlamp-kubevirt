name: ClusterFuzzLite PR fuzzing

on:
  pull_request:
    paths:
      - 'src/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'

permissions: read-all

jobs:
  PR:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Compile fuzz targets
        run: |
          npx tsc --outDir lib --rootDir src \
            --module commonjs --target es2020 \
            --esModuleInterop true --skipLibCheck true \
            --resolveJsonModule true \
            src/utils/pluginSettings.ts
          for target in fuzz/fuzz_*.js; do
            sed -i 's|../src/utils/pluginSettings|../lib/utils/pluginSettings|g' "$target"
          done

      - name: Fuzz validators (5 min)
        run: npx jazzer fuzz/fuzz_validators.js --sync -- -max_total_time=150

      - name: Fuzz settings parser (5 min)
        run: npx jazzer fuzz/fuzz_settings.js --sync -- -max_total_time=150
