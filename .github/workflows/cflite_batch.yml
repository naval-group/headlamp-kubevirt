name: ClusterFuzzLite batch fuzzing

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions: read-all

jobs:
  BatchFuzzing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Compile fuzz targets
        run: |
          npx tsc --outDir lib --rootDir src \
            --module commonjs --target es2020 \
            --esModuleInterop true --skipLibCheck true \
            --resolveJsonModule true \
            src/utils/pluginSettings.ts
          for target in fuzz/fuzz_*.js; do
            sed -i 's|../src/utils/pluginSettings|../lib/utils/pluginSettings|g' "$target"
          done

      - name: Fuzz validators (15 min)
        run: npx jazzer fuzz/fuzz_validators.js --sync -- -max_total_time=900

      - name: Fuzz settings parser (15 min)
        run: npx jazzer fuzz/fuzz_settings.js --sync -- -max_total_time=900
